# Fly.io configuration for Paperboy AI
# Deploy with: fly deploy

app = "paperboy-ai"
primary_region = "ord"  # Change to your preferred region
kill_timeout = "30s"  # Allow lifespan cancellation/checkpointing on deploy

[build]
  # Uses the existing Dockerfile

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Don't auto-stop: it was killing in-flight background digests mid-run
  auto_start_machines = true
  min_machines_running = 1  # Keep one machine warm so the daily digest run isn't stopped mid-flight
  processes = ["app"]

  # Health check disabled during initial deployment
  # [[http_service.checks]]
  #   grace_period = "30s"
  #   interval = "60s"
  #   method = "GET"
  #   path = "/digest-status/health"
  #   timeout = "10s"

[[vm]]
  # Downsized 2026-07: app is async I/O-bound (~50 min of work/day, mostly LLM wait);
  # 4gb/2cpu was 4-8x oversized and, always-on, drove the June invoice spike.
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Environment variables (non-sensitive)
[env]
  USE_LIGHTWEIGHT = "true"
  USE_SUPABASE = "true"
  USE_PYTHON_EMAIL_TEMPLATES = "true"
  NEWS_ENABLED = "true"
  LOG_LEVEL = "INFO"
  OPENAI_MODEL = "gpt-4o-mini"
  TOP_N_ARTICLES = "5"
  TOP_N_NEWS = "5"
  TASK_TIMEOUT = "600"
  DIGEST_TASK_TIMEOUT = "900"
  HTTP_TIMEOUT = "60"
  NEWS_MAX_ARTICLES = "50"
  NEWS_MAX_EXTRACT = "10"
  # Apply docs/supabase_orchestration.sql and install the service-role +
  # Resend secrets before enabling this during the n8n cutover.
  ORCHESTRATION_ENABLED = "false"
  ORCHESTRATION_HOUR_UTC = "13"
  ORCHESTRATION_PROFILE_INTERVAL_SECONDS = "60"
  ORCHESTRATION_MAX_CONCURRENT_PROFILES = "2"

# Optional: Persistent volume for data storage
# Uncomment if you want persistent local storage
# [mounts]
#   destination = "/app/data"
#   source = "paperboy_data"

# Secrets to set via: fly secrets set KEY=value
# Required secrets:
# - OPENAI_API_KEY
# - API_KEY (for authentication)
# - SUPABASE_URL
# - SUPABASE_KEY
#
# Required before ORCHESTRATION_ENABLED=true:
# - SUPABASE_SERVICE_ROLE_KEY
# - RESEND_API_KEY
# 
# Optional secrets (for news functionality):
# - NEWSAPI_KEY
# - TAVILY_API_KEY
# - LOGFIRE_TOKEN